name: Promote develop to main
on:
  push:
    branches: [develop]
permissions:
  contents: write
  pull-requests: write
jobs:
  create_pr:
    runs-on: ubuntu-latest
    env:
      PR_CREATION_TOKEN: ${{ secrets.PR_CREATION_TOKEN }}
    steps:
      - name: Create or update PR to main
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PR_CREATION_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const token = process.env.PR_CREATION_TOKEN;
            if (!token) {
              core.warning(
                'PR_CREATION_TOKEN secret not set — skipping automatic promotion.\n' +
                'Set it via: gh secret set PR_CREATION_TOKEN --body "<your-token>"'
              );
              return;
            }
            const prTitle = 'Promote develop to main';
            const prBody = 'Automated PR to propose changes from develop to main. Review and merge according to repo policy.';
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:develop`,
              base: 'main',
            });
            if (prs.length === 0) {
              await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: prTitle,
                head: 'develop',
                base: 'main',
                body: prBody,
              });
            } else {
              const pr = prs[0];
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                title: prTitle,
                body: prBody,
              });
            }
